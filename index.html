<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Roblox Viewer - VRAI FIX</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #222; padding: 25px; border-radius: 15px; text-align: center; width: 350px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00a2ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .display { margin-top: 20px; height: 300px; background: #0a0a0a; border: 2px dashed #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#00a2ff">Asset Viewer</h2>
    <input type="text" id="idInput" placeholder="Entrez l'ID (ex: 6073741)">
    <button onclick="view()">Afficher</button>
    <div class="display" id="out">
        <p id="t">L'image apparaîtra ici</p>
    </div>
</div>

<script>
function view() {
    const id = document.getElementById('idInput').value.replace(/\D/g, "");
    const out = document.getElementById('out');
    
    if(!id) return alert("ID vide !");

    out.innerHTML = "Chargement...";

    // Cette URL est une redirection automatique de Roblox qui fonctionne partout
    const finalUrl = `https://www.roblox.com/asset-thumbnail/image?assetId=${id}&width=420&height=420&format=png`;

    // On crée l'élément image dynamiquement pour forcer le rafraîchissement
    const newImg = new Image();
    newImg.src = finalUrl;
    
    newImg.onload = function() {
        out.innerHTML = "";
        out.appendChild(newImg);
    };

    newImg.onerror = function() {
        // Si ça rate, on tente l'ID - 1 (Astuce : l'image est souvent l'ID juste avant le Decal)
        out.innerHTML = "<p style='color:red'>Erreur. Tentative auto...</p>";
        const altUrl = `https://www.roblox.com/asset-thumbnail/image?assetId=${parseInt(id)-1}&width=420&height=420&format=png`;
        const altImg = new Image();
        altImg.src = altUrl;
        altImg.onload = () => { out.innerHTML = ""; out.appendChild(altImg); };
        altImg.onerror = () => { out.innerHTML = "<p style='color:red'>❌ ID Introuvable ou Privé</p>"; };
    };
}
</script>
</body>
</html>
