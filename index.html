<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Asset Viewer - Fix Final</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); text-align: center; width: 380px; border: 1px solid #333; }
        h2 { color: #00a2ff; margin-bottom: 25px; font-weight: 600; }
        input { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #00a2ff; box-shadow: 0 0 8px rgba(0,162,255,0.3); }
        button { width: 100%; padding: 14px; background: #00a2ff; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        button:hover { background: #0081cc; transform: translateY(-2px); }
        .img-box { margin-top: 25px; width: 100%; height: 320px; background: #0a0a0a; border: 2px dashed #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        img { max-width: 90%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        #status { color: #888; font-size: 14px; padding: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Asset Viewer</h2>
    <input type="text" id="assetId" placeholder="ID (ex: 6073741)">
    <button onclick="getRobloxImage()">Afficher l'image</button>
    <div class="img-box" id="container">
        <p id="status">L'image s'affichera ici</p>
    </div>
</div>

<script>
    async function getRobloxImage() {
        const input = document.getElementById('assetId').value;
        const id = input.replace(/\D/g, ""); // On ne garde que les chiffres
        const container = document.getElementById('container');
        
        if (!id) {
            alert("Veuillez entrer un ID valide !");
            return;
        }

        container.innerHTML = '<p id="status">Chargement en cours...</p>';

        try {
            // On appelle l'API officielle de Roblox pour récupérer l'URL de l'image
            const response = await fetch(`https://thumbnails.roblox.com/v1/assets?assetIds=${id}&returnPolicy=PlaceHolder&size=420x420&format=Png&isCircular=false`);
            const result = await response.json();

            if (result.data && result.data.length > 0 && result.data[0].imageUrl) {
                const imageUrl = result.data[0].imageUrl;
                container.innerHTML = `<img src="${imageUrl}" alt="Asset Roblox">`;
            } else {
                throw new Error("Pas trouvé");
            }
        } catch (error) {
            // Si l'API échoue, on tente la méthode de secours (ID-1 pour les Decals)
            console.log("Tentative de secours...");
            const fallbackId = parseInt(id) - 1;
            const fallbackUrl = `https://www.roblox.com/asset-thumbnail/image?assetId=${id}&width=420&height=420&format=png`;
            
            // On l'affiche directement via une balise img pour contourner les erreurs fetch
            container.innerHTML = `<img src="${fallbackUrl}" onerror="this.parentElement.innerHTML='<p style=\'color:#ff4d4d\'>❌ Image introuvable ou ID privé</p>'">`;
        }
    }
</script>

</body>
</html>
